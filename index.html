<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="screen-orientation" content="landscape" />
<title>Dash With Motion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  #app { position: fixed; inset: 0; display: block; }
  canvas#stage { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #hud {
    position: absolute; top: 12px; left: 16px;
    pointer-events: none;
    z-index: 10;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  #score { font-size: 28px; font-weight: 800; letter-spacing: 3px; }
  #levelLabel { font-size: 11px; letter-spacing: 2px; opacity: 0.85; margin-top: 2px; }
  #best { font-size: 11px; letter-spacing: 2px; opacity: 0.7; margin-top: 1px; }
  #camWrap {
    position: absolute; top: 12px; right: 12px;
    width: 96px; height: 72px; border-radius: 10px;
    overflow: hidden; border: 1px solid rgba(255,255,255,0.25);
    background: #000; z-index: 10;
    transform: scaleX(-1); display: none;
  }
  #camWrap.active { display: block; }
  #camVideo, #camOverlay { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #gestureLabel {
    position: absolute; bottom: 4px; left: 0; right: 0;
    text-align: center; font-size: 9px; letter-spacing: 1px;
    color: #fff; text-shadow: 0 1px 2px #000; transform: scaleX(-1);
    pointer-events: none;
  }
  #controls {
    position: absolute; bottom: 14px; left: 14px; right: 14px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 10; pointer-events: none;
  }
  .pill {
    pointer-events: auto;
    padding: 9px 13px; border-radius: 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    font-size: 11px; letter-spacing: 1.5px;
    color: #fff; font-family: inherit; cursor: pointer;
  }
  .pill.on { background: rgba(126,231,135,0.22); border-color: #7ee787; }
  .pill.warn { background: rgba(255,93,115,0.22); border-color: #ff5d73; }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 16px;
    z-index: 20; pointer-events: none;
    background: rgba(0,0,0,0.55);
  }
  .overlay.transparent { background: transparent; }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: 32px; font-weight: 800; letter-spacing: 4px; }
  .overlay h2 { font-size: 20px; font-weight: 700; letter-spacing: 3px; margin-top: 4px; }
  .overlay p { font-size: 13px; letter-spacing: 1px; margin-top: 8px; opacity: 0.85; }
  .overlay .row { display: flex; gap: 10px; margin-top: 14px; pointer-events: auto; }
  .overlay input.name {
    pointer-events: auto;
    padding: 8px 12px; border-radius: 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff; font-size: 13px; letter-spacing: 1px;
    text-align: center; width: 160px;
    font-family: inherit;
  }
  .overlay input.name::placeholder { color: rgba(255,255,255,0.45); }
  .leaderboard {
    background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px; padding: 14px 18px; margin-top: 14px;
    min-width: 280px; max-width: 360px;
    font-size: 12px; letter-spacing: 0.5px;
  }
  .leaderboard .lbrow {
    display: grid; grid-template-columns: 24px 1fr 60px 36px;
    gap: 8px; padding: 4px 0; align-items: center;
  }
  .leaderboard .lbrow.head { opacity: 0.6; font-size: 10px; letter-spacing: 1.5px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 4px; }
  .leaderboard .lbrow .nm { text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .leaderboard .lbrow .sc { text-align: right; font-weight: 700; }
  .leaderboard .lbrow .lv { text-align: right; opacity: 0.7; }
  .leaderboard .empty { opacity: 0.5; text-align: center; padding: 12px 0; font-size: 12px; }
  /* Rotation hint shown only in portrait */
  #rotateHint {
    position: absolute; inset: 0; z-index: 100;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; color: #fff;
    font-family: inherit; padding: 30px;
    text-align: center;
  }
  #rotateHint .icon {
    width: 60px; height: 90px;
    border: 2px solid #fff; border-radius: 8px;
    margin-bottom: 18px;
    animation: rot 2s ease-in-out infinite;
  }
  @keyframes rot { 0%,40% { transform: rotate(0); } 70%,100% { transform: rotate(-90deg); } }
  @media (orientation: portrait) and (max-width: 900px) {
    #rotateHint { display: flex; }
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="stage"></canvas>
  <div id="hud">
    <div id="score">0</div>
    <div id="levelLabel">LEVEL 1</div>
    <div id="best">BEST 0</div>
  </div>
  <div id="camWrap">
    <video id="camVideo" autoplay playsinline muted></video>
    <canvas id="camOverlay"></canvas>
    <div id="gestureLabel">—</div>
  </div>
  <div id="controls">
    <button id="gestureToggle" class="pill">GESTURE OFF</button>
    <button id="leaderboardBtn" class="pill">LEADERBOARD</button>
  </div>
  <div id="overlayStart" class="overlay">
    <h1>DASH WITH MOTION</h1>
    <p>Tap anywhere to start</p>
    <p>Or enable gesture and close your fist to jump</p>
  </div>
  <div id="overlayLevel" class="overlay hidden transparent">
    <h2 id="levelTitle">LEVEL 1</h2>
    <p id="levelSubtitle">NEON CITY</p>
  </div>
  <div id="overlayDead" class="overlay hidden">
    <h1>GAME OVER</h1>
    <p id="deadScore">Score 0 · Best 0</p>
    <div id="nameRow" class="row" style="display:none;">
      <input class="name" id="nameInput" placeholder="Enter your name" maxlength="14" />
      <button class="pill" id="saveBtn">SAVE</button>
    </div>
    <div class="row">
      <button class="pill" id="retryBtn">TAP TO RETRY</button>
      <button class="pill" id="viewBtn">LEADERBOARD</button>
    </div>
  </div>
  <div id="overlayLeaderboard" class="overlay hidden">
    <h1>LEADERBOARD</h1>
    <div class="leaderboard" id="lbList"></div>
    <div class="row">
      <button class="pill" id="closeLbBtn">CLOSE</button>
    </div>
  </div>
  <div id="rotateHint">
    <div class="icon"></div>
    <div style="font-size:14px; letter-spacing:2px; font-weight:600;">ROTATE YOUR PHONE</div>
    <div style="font-size:11px; letter-spacing:1px; opacity:0.7; margin-top:6px;">DASH WITH MOTION PLAYS IN LANDSCAPE</div>
  </div>
</div>
<script type="module">
import { GestureRecognizer, FilesetResolver } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// =============================================================
// THEMES — one per level tier
// =============================================================
const THEMES = {
  neon: {
    name: 'NEON CITY',
    sky: ['#0a0420', '#240b48', '#5b1175'],
    sunCenter: '#ff7ab8', sunEdge: '#ff3a86',
    grid: '#ff3a86', gridAlpha: 0.55,
    ground: '#ff3a86', groundFill: '#1a0930',
    spike: '#ff3a86', spikeAccent: '#ffd6ff',
    tall: '#a020ff', tallAccent: '#ffd6ff',
    cube: '#ff3aff', cubeAccent: '#ffd6ff',
    text: '#ff7ab8', textAccent: '#a020ff',
    skyline: '#1a0930',
  },
  paper: {
    name: 'PAPER WORLD',
    sky: ['#f5ecd9', '#f5ecd9', '#f5ecd9'],
    sunCenter: '#f5ecd9', sunEdge: '#f5ecd9',
    grid: '#3a2e1a', gridAlpha: 0.18,
    ground: '#3a2e1a', groundFill: '#c4a872',
    spike: '#e85d3f', spikeAccent: '#3a2e1a',
    tall: '#7c4cc0', tallAccent: '#3a2e1a',
    cube: '#3a2e1a', cubeAccent: '#f5ecd9',
    text: '#3a2e1a', textAccent: '#6b5836',
    skyline: '#d9c89e',
  },
  vapor: {
    name: 'VAPOR DRIFT',
    sky: ['#f7c1d9', '#c8d1ff', '#9ee5f0'],
    sunCenter: '#ffffff', sunEdge: '#f7c1d9',
    grid: '#ffffff', gridAlpha: 0.4,
    ground: '#ffffff', groundFill: '#5b78d8',
    spike: '#ff8fb1', spikeAccent: '#ffffff',
    tall: '#a78bff', tallAccent: '#ffffff',
    cube: '#ffe26a', cubeAccent: '#ffffff',
    text: '#3a2658', textAccent: '#6a5b8a',
    skyline: '#c8d1ff',
  },
  void: {
    name: 'THE VOID',
    sky: ['#0a0608', '#0a0608', '#0a0608'],
    sunCenter: '#0a0608', sunEdge: '#0a0608',
    grid: '#ff1a3a', gridAlpha: 0.35,
    ground: '#ff1a3a', groundFill: '#0a0608',
    spike: '#ff1a3a', spikeAccent: '#ffffff',
    tall: '#ffffff', tallAccent: '#ff1a3a',
    cube: '#ffffff', cubeAccent: '#ff1a3a',
    text: '#ff1a3a', textAccent: '#ffffff',
    skyline: '#1a0306',
  },
};

// Map level number → theme key
function themeForLevel(n) {
  if (n >= 10) return 'void';
  if (n >= 7)  return 'vapor';
  if (n >= 4)  return 'paper';
  return 'neon';
}

// =============================================================
// LEVELS — gentle ramp, 10 levels
// =============================================================
// Each level has a duration (in seconds of survival) and a difficulty band.
// Difficulty (0..1) controls scroll speed multiplier and pattern weighting.
const LEVELS = [
  { n: 1,  durationS: 30, difficulty: 0.05, speedMul: 0.85, name: 'WAKE UP' },
  { n: 2,  durationS: 35, difficulty: 0.15, speedMul: 0.92, name: 'WARM UP' },
  { n: 3,  durationS: 40, difficulty: 0.25, speedMul: 1.00, name: 'GROOVE' },
  { n: 4,  durationS: 40, difficulty: 0.35, speedMul: 1.05, name: 'FOLD' },
  { n: 5,  durationS: 45, difficulty: 0.45, speedMul: 1.10, name: 'CREASE' },
  { n: 6,  durationS: 45, difficulty: 0.55, speedMul: 1.15, name: 'ORIGAMI' },
  { n: 7,  durationS: 50, difficulty: 0.65, speedMul: 1.20, name: 'DRIFT' },
  { n: 8,  durationS: 50, difficulty: 0.75, speedMul: 1.25, name: 'VAPOR' },
  { n: 9,  durationS: 55, difficulty: 0.85, speedMul: 1.30, name: 'STORM' },
  { n: 10, durationS: 60, difficulty: 1.00, speedMul: 1.40, name: 'THE VOID' },
];

// =============================================================
// PHYSICS — smaller blocks now (32 instead of 42)
// =============================================================
const BLOCK_PX = 32;
const JUMP_HEIGHT_BLOCKS = 2.6;
const JUMP_RISE_S = 0.22;
const JUMP_FALL_S = 0.18;
const _h = JUMP_HEIGHT_BLOCKS * BLOCK_PX;
const _gUp = (2 * _h) / (JUMP_RISE_S * JUMP_RISE_S);
const _gDown = (2 * _h) / (JUMP_FALL_S * JUMP_FALL_S);
const _v0 = -_gUp * JUMP_RISE_S;

const CFG = {
  gravityUp: _gUp,
  gravityDown: _gDown,
  jumpVelocity: _v0,
  baseScrollSpeed: 9.5 * BLOCK_PX,   // levels multiply this
  playerSize: BLOCK_PX,
  playerX: 110,
  groundOffset: 90,
  coyoteTimeS: 0.10,
  jumpBufferS: 0.14,
  jumpDebounceMs: 220,
  deathLockoutMs: 800,
  fistConfidence: 0.40,
  musicBpm: 130,
  musicUrl: 'audio/track.mp3',
  musicVolume: 0.55,
};

const JUMP_ARC_S = JUMP_RISE_S + JUMP_FALL_S;
const JUMP_DISTANCE_PX_BASE = CFG.baseScrollSpeed * JUMP_ARC_S;
const MAX_CLUSTER_BLOCKS = (JUMP_DISTANCE_PX_BASE / BLOCK_PX) * 0.75;
const MIN_REST_BLOCKS = (JUMP_DISTANCE_PX_BASE / BLOCK_PX) * 1.20;

function currentScrollSpeed() {
  return CFG.baseScrollSpeed * (state.level?.speedMul || 1);
}
function beatsToPx(beats) {
  return beats * currentScrollSpeed() * (60 / CFG.musicBpm);
}

// =============================================================
// AUDIO
// =============================================================
let audioCtx = null, musicEl = null;
function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  musicEl = new Audio(CFG.musicUrl);
  musicEl.loop = true;
  musicEl.volume = CFG.musicVolume;
  musicEl.preload = 'auto';
  musicEl.addEventListener('error', () => {
    console.warn('Music file not found at', CFG.musicUrl, '— gameplay continues silently');
  });
}
function startMusic() {
  if (!musicEl) return;
  try { musicEl.currentTime = 0; const p = musicEl.play(); if (p?.catch) p.catch(()=>{}); } catch(e){}
}
function stopMusic() { if (musicEl) try { musicEl.pause(); } catch(e){} }
function playJumpSfx() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(420, t);
  o.frequency.exponentialRampToValueAtTime(900, t + 0.07);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.18, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.08);
  o.connect(g).connect(audioCtx.destination);
  o.start(t); o.stop(t + 0.1);
}
function playCrashSfx() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.45, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const filt = audioCtx.createBiquadFilter(); filt.type = 'lowpass';
  filt.frequency.setValueAtTime(900, t);
  filt.frequency.exponentialRampToValueAtTime(80, t + 0.4);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.7, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
  src.connect(filt).connect(g).connect(audioCtx.destination);
  src.start(t);
}
function playLevelUpSfx() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [440, 660, 880].forEach((f, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, t + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.18, t + i * 0.08 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.08 + 0.18);
    o.connect(g).connect(audioCtx.destination);
    o.start(t + i * 0.08); o.stop(t + i * 0.08 + 0.2);
  });
}

// =============================================================
// CANVAS
// =============================================================
const stage = document.getElementById('stage');
const ctx = stage.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  stage.width = W * DPR; stage.height = H * DPR;
  stage.style.width = W + 'px'; stage.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();
function groundY() { return H - CFG.groundOffset; }

// =============================================================
// STATE
// =============================================================
let nextObstacleId = 1;
const state = {
  running: false, dead: false, deadAt: 0,
  playerY: 0, velY: 0, onGround: true,
  cameraX: 0, obstacles: [],
  elapsed: 0, levelTimeRemaining: 0,
  coyoteRemaining: 0, jumpBufferRemaining: 0,
  nextSpawnX: 0, patternsPlaced: 0,
  score: 0, particles: [],
  level: LEVELS[0],
  levelIndex: 0,
  levelTransitionAt: 0,   // performance.now() of last level-up; UI fades
};

const LB_KEY = 'dwm_leaderboard_v2';
function loadLeaderboard() {
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch(e) { return []; }
}
function saveLeaderboard(lb) {
  try { localStorage.setItem(LB_KEY, JSON.stringify(lb)); } catch(e){}
}
function bestScore() {
  const lb = loadLeaderboard();
  return lb.length ? lb[0].score : 0;
}

function reset() {
  state.running = true; state.dead = false; state.deadAt = 0;
  state.playerY = 0; state.velY = 0; state.onGround = true;
  state.cameraX = 0; state.obstacles = [];
  state.elapsed = 0;
  state.coyoteRemaining = 0; state.jumpBufferRemaining = 0;
  state.nextSpawnX = W + 200; state.patternsPlaced = 0;
  state.score = 0; state.particles = [];
  state.levelIndex = 0;
  state.level = LEVELS[0];
  state.levelTimeRemaining = state.level.durationS;
  state.levelTransitionAt = performance.now();
  document.getElementById('overlayStart').classList.add('hidden');
  document.getElementById('overlayDead').classList.add('hidden');
  document.getElementById('overlayLeaderboard').classList.add('hidden');
  document.getElementById('nameRow').style.display = 'none';
  document.getElementById('levelLabel').textContent = `LEVEL 1 · ${state.level.name}`;
  showLevelOverlay(state.level);
  startMusic();
}

function advanceLevel() {
  if (state.levelIndex >= LEVELS.length - 1) {
    // Stay on level 10 indefinitely after reaching it
    state.levelTimeRemaining = state.level.durationS;
    return;
  }
  state.levelIndex += 1;
  state.level = LEVELS[state.levelIndex];
  state.levelTimeRemaining = state.level.durationS;
  state.levelTransitionAt = performance.now();
  document.getElementById('levelLabel').textContent = `LEVEL ${state.level.n} · ${state.level.name}`;
  showLevelOverlay(state.level);
  playLevelUpSfx();
}

function showLevelOverlay(lv) {
  const o = document.getElementById('overlayLevel');
  document.getElementById('levelTitle').textContent = `LEVEL ${lv.n}`;
  document.getElementById('levelSubtitle').textContent = lv.name;
  o.classList.remove('hidden');
  setTimeout(() => o.classList.add('hidden'), 1400);
}

function requestJump() {
  if (state.dead) {
    if (performance.now() - state.deadAt < CFG.deathLockoutMs) return;
    reset(); return;
  }
  if (!state.running) { reset(); return; }
  state.jumpBufferRemaining = CFG.jumpBufferS;
}

function die() {
  if (state.dead) return;
  state.running = false;
  state.dead = true;
  state.deadAt = performance.now();
  // Eligible for leaderboard if score is in top 10
  const lb = loadLeaderboard();
  const eligible = lb.length < 10 || state.score > lb[lb.length - 1].score;
  document.getElementById('deadScore').textContent =
    `LEVEL ${state.level.n} · SCORE ${state.score} · BEST ${bestScore()}`;
  document.getElementById('overlayDead').classList.remove('hidden');
  document.getElementById('nameRow').style.display = eligible && state.score > 0 ? 'flex' : 'none';
  if (eligible && state.score > 0) {
    document.getElementById('nameInput').value = localStorage.getItem('dwm_lastName') || '';
    setTimeout(() => document.getElementById('nameInput').focus(), 100);
  }
  playCrashSfx();
  stopMusic();
  for (let i = 0; i < 28; i++) {
    state.particles.push({
      x: CFG.playerX + CFG.playerSize / 2,
      y: groundY() + state.playerY + CFG.playerSize / 2,
      vx: (Math.random() - 0.5) * 700,
      vy: (Math.random() - 1) * 600,
      life: 0.85,
    });
  }
}

// =============================================================
// OBSTACLE PATTERNS
// =============================================================
const SPIKE = (off) => ({ type:'spike', offset:off, w:1.0, h:1.0 });
const TALL  = (off, h=1.6) => ({ type:'tall', offset:off, w:0.85, h });

const PATTERNS = [
  { name:'single',          minDifficulty:0.00, parts:[SPIKE(0)],                  restBeats:2.0 },
  { name:'single-wide',     minDifficulty:0.00, parts:[SPIKE(0)],                  restBeats:2.5 },
  { name:'tall-solo',       minDifficulty:0.10, parts:[TALL(0,1.8)],               restBeats:2.0 },
  { name:'double-touching', minDifficulty:0.20, parts:[SPIKE(0),SPIKE(0.85)],      restBeats:1.5 },
  { name:'spike-tall',      minDifficulty:0.35, parts:[SPIKE(0),TALL(1.0,1.6)],    restBeats:1.5 },
  { name:'tall-spike',      minDifficulty:0.45, parts:[TALL(0,1.6),SPIKE(1.0)],    restBeats:1.5 },
];

function pickPattern(difficulty) {
  const eligible = PATTERNS.filter(p => p.minDifficulty <= difficulty);
  const weights = eligible.map(p =>
    Math.max(0.2, 1 + (difficulty - 0.5) * (p.minDifficulty > 0.3 ? 2 : -1.5))
  );
  const total = weights.reduce((a,b)=>a+b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < eligible.length; i++) {
    r -= weights[i];
    if (r <= 0) return eligible[i];
  }
  return eligible[0];
}

function placePattern(originX, pattern) {
  let maxRight = 0;
  for (const part of pattern.parts) {
    const wPx = part.w * BLOCK_PX;
    const hPx = part.h * BLOCK_PX;
    const x = originX + part.offset * BLOCK_PX;
    state.obstacles.push({ id:nextObstacleId++, type:part.type, worldX:x, w:wPx, h:hPx });
    maxRight = Math.max(maxRight, x + wPx);
  }
  return maxRight;
}

function spawnObstacles() {
  const difficulty = state.level.difficulty;
  const spawnWindow = state.cameraX + W + 200;
  const minRestPx = MIN_REST_BLOCKS * BLOCK_PX;
  while (state.nextSpawnX < spawnWindow) {
    const useEasy = state.patternsPlaced < 2;
    const p = useEasy ? PATTERNS[1] : pickPattern(difficulty);
    const rightEdge = placePattern(state.nextSpawnX, p);
    const restPx = Math.max(minRestPx, beatsToPx(p.restBeats));
    state.nextSpawnX = rightEdge + restPx;
    state.patternsPlaced += 1;
  }
}

// =============================================================
// PHYSICS STEP
// =============================================================
function step(dt) {
  if (!state.running) { updateParticles(dt); return; }
  state.elapsed += dt;
  state.levelTimeRemaining -= dt;
  if (state.levelTimeRemaining <= 0) advanceLevel();

  state.coyoteRemaining = Math.max(0, state.coyoteRemaining - dt);
  state.jumpBufferRemaining = Math.max(0, state.jumpBufferRemaining - dt);

  const canJump = state.onGround || state.coyoteRemaining > 0;
  if (state.jumpBufferRemaining > 0 && canJump) {
    state.velY = CFG.jumpVelocity;
    state.onGround = false;
    state.coyoteRemaining = 0;
    state.jumpBufferRemaining = 0;
    playJumpSfx();
  }

  const wasOnGround = state.onGround;
  const grav = state.velY < 0 ? CFG.gravityUp : CFG.gravityDown;
  state.velY += grav * dt;
  state.playerY += state.velY * dt;
  if (state.playerY >= 0) {
    state.playerY = 0; state.velY = 0; state.onGround = true;
  } else {
    state.onGround = false;
  }
  if (wasOnGround && !state.onGround && state.velY > 0) {
    state.coyoteRemaining = CFG.coyoteTimeS;
  }

  state.cameraX += currentScrollSpeed() * dt;
  spawnObstacles();
  state.obstacles = state.obstacles.filter(o => o.worldX + o.w > state.cameraX - 80);

  const inset = CFG.playerSize * 0.14;
  const pLeft = state.cameraX + CFG.playerX + inset;
  const pRight = state.cameraX + CFG.playerX + CFG.playerSize - inset;
  const pTop = groundY() + state.playerY + inset;
  const pBottom = groundY() + state.playerY + CFG.playerSize - inset;
  for (const o of state.obstacles) {
    const oLeft = o.worldX, oRight = o.worldX + o.w;
    const oTop = groundY() + CFG.playerSize - o.h;
    const oBottom = groundY() + CFG.playerSize;
    if (pRight > oLeft && pLeft < oRight && pBottom > oTop && pTop < oBottom) {
      die(); return;
    }
  }
  state.score = Math.floor(state.cameraX / 10);
  updateParticles(dt);
}
function updateParticles(dt) {
  for (const p of state.particles) {
    p.vy += 1400 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
  }
  state.particles = state.particles.filter(p => p.life > 0);
}

// =============================================================
// RENDER — theme-aware
// =============================================================
function render() {
  const T = THEMES[themeForLevel(state.level.n)];

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, T.sky[0]);
  grad.addColorStop(0.55, T.sky[1]);
  grad.addColorStop(1, T.sky[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const themeKey = themeForLevel(state.level.n);

  // Theme-specific backdrop
  if (themeKey === 'neon') drawNeonBackdrop(T);
  else if (themeKey === 'paper') drawPaperBackdrop(T);
  else if (themeKey === 'vapor') drawVaporBackdrop(T);
  else if (themeKey === 'void')  drawVoidBackdrop(T);

  // Ground line
  ctx.fillStyle = T.ground;
  ctx.fillRect(0, groundY() + CFG.playerSize, W, 2);

  // Obstacles
  for (const o of state.obstacles) {
    const sx = o.worldX - state.cameraX;
    if (sx < -80 || sx > W + 20) continue;
    if (o.type === 'tall') {
      const top = groundY() + CFG.playerSize - o.h;
      ctx.fillStyle = T.tall;
      ctx.fillRect(sx, top, o.w, o.h);
      ctx.fillStyle = T.tallAccent;
      ctx.globalAlpha = 0.35;
      ctx.fillRect(sx, top, o.w, 3);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = T.spike;
      drawSpike(sx, groundY() + CFG.playerSize, o.w, o.h);
      ctx.fillStyle = T.spikeAccent;
      ctx.globalAlpha = 0.4;
      drawSpikeOutline(sx, groundY() + CFG.playerSize, o.w, o.h);
      ctx.globalAlpha = 1;
    }
  }

  // Player
  const px = CFG.playerX + CFG.playerSize / 2;
  const py = groundY() + state.playerY + CFG.playerSize / 2;
  const rot = (state.cameraX * 0.012) % (Math.PI * 2);
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(rot);
  if (themeKey === 'neon' || themeKey === 'void') {
    ctx.shadowColor = T.cube; ctx.shadowBlur = 12;
  }
  ctx.fillStyle = T.cube;
  ctx.fillRect(-CFG.playerSize/2, -CFG.playerSize/2, CFG.playerSize, CFG.playerSize);
  ctx.shadowBlur = 0;
  ctx.fillStyle = T.cubeAccent;
  ctx.globalAlpha = 0.35;
  ctx.fillRect(-CFG.playerSize/2 + 5, -CFG.playerSize/2 + 5, CFG.playerSize - 10, CFG.playerSize - 10);
  ctx.globalAlpha = 1;
  ctx.restore();

  // Particles
  for (const p of state.particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = T.cube;
    ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
  }
  ctx.globalAlpha = 1;

  document.getElementById('score').textContent = state.score;
  document.getElementById('best').textContent = `BEST ${Math.max(bestScore(), state.score)}`;
}

function drawSpike(x, baseY, w, h) {
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.lineTo(x + w/2, baseY - h);
  ctx.lineTo(x + w, baseY);
  ctx.closePath();
  ctx.fill();
}
function drawSpikeOutline(x, baseY, w, h) {
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.lineTo(x + w/2, baseY - h);
  ctx.lineTo(x + w/2, baseY);
  ctx.closePath();
  ctx.fill();
}

// Theme backdrops --------------------------------------------------
function drawNeonBackdrop(T) {
  // sun disc
  const sunX = W * 0.5, sunY = groundY() - 30;
  const sgrad = ctx.createLinearGradient(sunX, sunY - 70, sunX, sunY + 70);
  sgrad.addColorStop(0, T.sunCenter);
  sgrad.addColorStop(1, T.sunEdge);
  ctx.fillStyle = sgrad;
  ctx.beginPath(); ctx.arc(sunX, sunY, 70, 0, Math.PI * 2); ctx.fill();
  // sun stripes
  ctx.fillStyle = T.sky[0];
  for (let i = 0; i < 4; i++) ctx.fillRect(sunX - 70, sunY + 8 + i * 10, 140, 3);
  // perspective grid
  ctx.strokeStyle = T.grid;
  ctx.globalAlpha = T.gridAlpha;
  ctx.lineWidth = 1;
  for (let i = 1; i < 6; i++) {
    const y = groundY() + CFG.playerSize + 4 + i * 10;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let x = -W; x < W * 2; x += 80) {
    const offset = (state.cameraX * 0.5) % 80;
    ctx.beginPath();
    ctx.moveTo(x - offset + W/2, groundY() + CFG.playerSize);
    ctx.lineTo((x - offset + W/2 - W/2) * 3 + W/2, H);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
function drawPaperBackdrop(T) {
  // soft hill silhouettes
  ctx.fillStyle = '#e8dcc1';
  ctx.beginPath();
  ctx.moveTo(0, groundY() - 20);
  for (let x = 0; x <= W; x += 40) {
    const y = groundY() - 20 + Math.sin((x + state.cameraX * 0.2) * 0.02) * 8;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, groundY()); ctx.lineTo(0, groundY()); ctx.closePath(); ctx.fill();
  ctx.fillStyle = T.skyline;
  ctx.beginPath();
  ctx.moveTo(0, groundY());
  for (let x = 0; x <= W; x += 50) {
    const y = groundY() + Math.sin((x + state.cameraX * 0.1) * 0.03) * 5;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
  // ground tiles
  ctx.fillStyle = T.groundFill;
  ctx.fillRect(0, groundY() + CFG.playerSize, W, H - groundY() - CFG.playerSize);
  ctx.strokeStyle = T.grid;
  ctx.globalAlpha = T.gridAlpha;
  const tileW = 60;
  const off = (state.cameraX) % tileW;
  for (let x = -off; x < W + tileW; x += tileW) {
    ctx.beginPath();
    ctx.moveTo(x, groundY() + CFG.playerSize);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
function drawVaporBackdrop(T) {
  // floating cloud strips (parallax)
  ctx.fillStyle = '#ffffff'; ctx.globalAlpha = 0.55;
  const cOff = (state.cameraX * 0.15);
  for (let i = 0; i < 5; i++) {
    const x = (i * 200 - cOff % 200);
    const y = 60 + i * 22;
    ctx.beginPath(); ctx.ellipse(x, y, 70, 16, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // ocean band
  ctx.fillStyle = T.groundFill; ctx.globalAlpha = 0.35;
  ctx.fillRect(0, groundY() + CFG.playerSize, W, H - groundY() - CFG.playerSize);
  ctx.globalAlpha = 1;
}
function drawVoidBackdrop(T) {
  // grid wash
  ctx.strokeStyle = T.grid;
  ctx.globalAlpha = 0.18;
  ctx.lineWidth = 0.5;
  const step = 40;
  const off = (state.cameraX * 0.4) % step;
  for (let x = -off; x < W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, groundY() + CFG.playerSize); ctx.stroke();
  }
  for (let y = 0; y < groundY(); y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// =============================================================
// MAIN LOOP
// =============================================================
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.033, (now - last) / 1000);
  last = now;
  step(dt); render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// =============================================================
// LEADERBOARD UI
// =============================================================
function renderLeaderboard() {
  const list = document.getElementById('lbList');
  const lb = loadLeaderboard();
  list.innerHTML = '';
  const head = document.createElement('div');
  head.className = 'lbrow head';
  head.innerHTML = '<span>#</span><span class="nm">NAME</span><span class="sc">SCORE</span><span class="lv">LV</span>';
  list.appendChild(head);
  if (lb.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No scores yet — be the first.';
    list.appendChild(empty);
    return;
  }
  lb.forEach((row, i) => {
    const div = document.createElement('div');
    div.className = 'lbrow';
    div.innerHTML = `<span>${i+1}</span><span class="nm">${escapeHtml(row.name)}</span><span class="sc">${row.score}</span><span class="lv">${row.level}</span>`;
    list.appendChild(div);
  });
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showLeaderboard() {
  renderLeaderboard();
  document.getElementById('overlayLeaderboard').classList.remove('hidden');
}
function hideLeaderboard() {
  document.getElementById('overlayLeaderboard').classList.add('hidden');
}

// =============================================================
// INPUT
// =============================================================
document.addEventListener('pointerdown', (e) => {
  initAudio();
  if (e.target.closest('.pill')) return;
  if (e.target.closest('input')) return;
  // ignore taps inside any visible modal that has its own buttons
  if (!document.getElementById('overlayDead').classList.contains('hidden')) return;
  if (!document.getElementById('overlayLeaderboard').classList.contains('hidden')) return;
  requestJump();
});
document.getElementById('retryBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (state.dead) {
    if (performance.now() - state.deadAt < CFG.deathLockoutMs) return;
    reset();
  }
});
document.getElementById('viewBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  showLeaderboard();
});
document.getElementById('leaderboardBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  showLeaderboard();
});
document.getElementById('closeLbBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  hideLeaderboard();
});
document.getElementById('saveBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  const name = (document.getElementById('nameInput').value || '').trim().slice(0, 14) || 'Anon';
  localStorage.setItem('dwm_lastName', name);
  const lb = loadLeaderboard();
  lb.push({ name, score: state.score, level: state.level.n, date: new Date().toISOString().slice(0,10) });
  lb.sort((a,b) => b.score - a.score);
  saveLeaderboard(lb.slice(0, 10));
  document.getElementById('nameRow').style.display = 'none';
  showLeaderboard();
});
document.getElementById('nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('saveBtn').click(); }
});

// =============================================================
// GESTURE — MediaPipe
// =============================================================
const camWrap = document.getElementById('camWrap');
const camVideo = document.getElementById('camVideo');
const camOverlay = document.getElementById('camOverlay');
const camOverlayCtx = camOverlay.getContext('2d');
const gestureLabel = document.getElementById('gestureLabel');
const toggleBtn = document.getElementById('gestureToggle');

let gestureRecognizer = null, gestureModeOn = false;
let videoStream = null, lastFistAt = 0, recognitionLoopId = null;

async function initGestureRecognizer() {
  toggleBtn.textContent = 'LOADING...';
  toggleBtn.classList.add('warn');
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
  );
  gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-tasks/gesture_recognizer/gesture_recognizer.task',
      delegate: 'GPU',
    },
    runningMode: 'VIDEO',
    numHands: 1,
  });
  toggleBtn.classList.remove('warn');
}

async function startGestureMode() {
  try {
    if (!gestureRecognizer) await initGestureRecognizer();
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 320, height: 240 }, audio: false
    });
    camVideo.srcObject = videoStream;
    await camVideo.play();
    camWrap.classList.add('active');
    camOverlay.width = camVideo.videoWidth || 320;
    camOverlay.height = camVideo.videoHeight || 240;
    gestureModeOn = true;
    toggleBtn.textContent = 'GESTURE ON';
    toggleBtn.classList.add('on');
    runRecognitionLoop();
  } catch (err) {
    console.error(err);
    toggleBtn.textContent = 'GESTURE OFF';
    toggleBtn.classList.remove('on');
    alert('Camera permission denied or model failed: ' + err.message);
  }
}
function stopGestureMode() {
  gestureModeOn = false;
  if (recognitionLoopId) cancelAnimationFrame(recognitionLoopId);
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
  camWrap.classList.remove('active');
  toggleBtn.textContent = 'GESTURE OFF';
  toggleBtn.classList.remove('on');
  gestureLabel.textContent = '—';
}
toggleBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  initAudio();
  if (gestureModeOn) stopGestureMode(); else startGestureMode();
});

function runRecognitionLoop() {
  let lastVideoTime = -1;
  const tick = () => {
    if (!gestureModeOn) return;
    if (camVideo.readyState >= 2 && camVideo.currentTime !== lastVideoTime) {
      lastVideoTime = camVideo.currentTime;
      try {
        const result = gestureRecognizer.recognizeForVideo(camVideo, performance.now());
        handleResult(result);
        drawHandLandmarks(result);
      } catch (e) {}
    }
    recognitionLoopId = requestAnimationFrame(tick);
  };
  recognitionLoopId = requestAnimationFrame(tick);
}

const JUMP_GESTURES = new Set(['Closed_Fist','Pointing_Up','Victory','Thumb_Up','ILoveYou']);
function handleResult(result) {
  if (!result?.gestures || !result.gestures.length) {
    gestureLabel.textContent = '—'; return;
  }
  const top = result.gestures[0][0];
  gestureLabel.textContent = `${top.categoryName} ${(top.score*100).toFixed(0)}%`;
  const isJump = JUMP_GESTURES.has(top.categoryName) && top.score > CFG.fistConfidence;
  const now = performance.now();
  if (isJump && now - lastFistAt > CFG.jumpDebounceMs) {
    requestJump();
    lastFistAt = now;
  }
}
function drawHandLandmarks(result) {
  const c = camOverlayCtx;
  c.clearRect(0, 0, camOverlay.width, camOverlay.height);
  if (!result?.landmarks?.length) return;
  c.fillStyle = '#7ee787';
  for (const hand of result.landmarks) {
    for (const lm of hand) {
      c.beginPath();
      c.arc(lm.x * camOverlay.width, lm.y * camOverlay.height, 3, 0, Math.PI*2);
      c.fill();
    }
  }
}

// Show initial best on load
document.getElementById('best').textContent = `BEST ${bestScore()}`;
</script>
