<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Dash With Motion</title>
<style>
  :root {
    --bg: #0b0d12;
    --player: #ffd166;
    --spike: #ff5d73;
    --tall: #c77dff;
    --ground: #7ee787;
    --text: #ffffff;
    --muted: #9aa0a6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  #app { position: fixed; inset: 0; display: block; }
  canvas#stage {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
    background: var(--bg);
  }
  #hud {
    position: absolute; top: env(safe-area-inset-top, 14px); left: 16px;
    pointer-events: none;
    z-index: 10;
  }
  #score { font-size: 32px; font-weight: 800; letter-spacing: 3px; text-shadow: 0 2px 8px rgba(0,0,0,.5); }
  #best { font-size: 11px; letter-spacing: 2px; color: var(--muted); margin-top: 2px; }

  #camWrap {
    position: absolute;
    top: env(safe-area-inset-top, 12px); right: 12px;
    width: 120px; height: 90px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.25);
    background: #000;
    z-index: 10;
    transform: scaleX(-1);
    display: none;
  }
  #camWrap.active { display: block; }
  #camVideo, #camOverlay {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #gestureLabel {
    position: absolute; bottom: 4px; left: 0; right: 0;
    text-align: center;
    font-size: 10px; letter-spacing: 1px;
    color: #fff; text-shadow: 0 1px 2px #000;
    transform: scaleX(-1);
    pointer-events: none;
  }

  #controls {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 16px) + 14px);
    left: 16px; right: 16px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 10;
    pointer-events: none;
  }
  .pill {
    pointer-events: auto;
    padding: 10px 14px;
    border-radius: 20px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.15);
    font-size: 11px; letter-spacing: 1.5px;
    color: #fff;
  }
  .pill.on { background: rgba(126,231,135,.18); border-color: var(--ground); }
  .pill.warn { background: rgba(255,93,115,.18); border-color: var(--spike); }

  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 20px;
    z-index: 5;
    pointer-events: none;
  }
  .overlay h1 { font-size: 36px; font-weight: 800; letter-spacing: 5px; }
  .overlay p { color: var(--muted); margin-top: 10px; font-size: 13px; letter-spacing: 1.5px; }
  .overlay.hidden { display: none; }
</style>
</head>
<body>
<div id="app">
  <canvas id="stage"></canvas>

  <div id="hud">
    <div id="score">0</div>
    <div id="best">BEST 0</div>
  </div>

  <div id="camWrap">
    <video id="camVideo" autoplay playsinline muted></video>
    <canvas id="camOverlay"></canvas>
    <div id="gestureLabel">—</div>
  </div>

  <div id="controls">
    <button id="gestureToggle" class="pill">GESTURE OFF</button>
    <button id="restartBtn" class="pill" style="visibility:hidden">RESTART</button>
  </div>

  <div id="overlayStart" class="overlay">
    <h1>DASH WITH MOTION</h1>
    <p>Tap anywhere to start</p>
    <p style="margin-top:6px">Or enable gesture mode and close your fist to jump</p>
  </div>

  <div id="overlayDead" class="overlay hidden">
    <h1>CRASH</h1>
    <p id="deadScore">Score 0</p>
    <p>Tap to retry</p>
  </div>
</div>

<script type="module">
import { GestureRecognizer, FilesetResolver } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// =============================================================
// PHYSICS — Geometry Dash-derived
// =============================================================
// Physics — asymmetric gravity (fast rise, faster fall). The cube pops up
// quickly, peaks, then plummets. This is what makes platformers feel "good"
// — symmetric gravity is technically correct but feels floaty on the way down.
const BLOCK_PX = 42;
const JUMP_HEIGHT_BLOCKS = 2.6;       // taller, more dramatic pop
const JUMP_RISE_S = 0.22;             // 220ms up
const JUMP_FALL_S = 0.18;             // 180ms down — faster than rise
// Derive: at peak, vy=0. Going up: 0 = v0 + gUp*riseT, so v0 = -gUp*riseT.
// Height = -v0*riseT - 0.5*gUp*riseT² = 0.5*gUp*riseT² → gUp = 2h/riseT²
const _h = JUMP_HEIGHT_BLOCKS * BLOCK_PX;
const _gUp = (2 * _h) / (JUMP_RISE_S * JUMP_RISE_S);
const _gDown = (2 * _h) / (JUMP_FALL_S * JUMP_FALL_S);
const _v0 = -_gUp * JUMP_RISE_S;

const CFG = {
  // physics
  gravityUp: _gUp,                     // ~9900 px/s² while ascending
  gravityDown: _gDown,                 // ~14800 px/s² while descending — falls FAST
  jumpVelocity: _v0,                   // ~-2180 px/s — strong pop
  scrollSpeed: 9.5 * BLOCK_PX,         // ~400 px/s
  // player
  playerSize: BLOCK_PX,
  playerX: 140,
  groundOffset: 110,
  // input forgiveness
  coyoteTimeS: 0.10,
  jumpBufferS: 0.14,
  // gesture
  jumpDebounceMs: 220,                 // min ms between auto-jumps when fist is held
  // death lockout
  deathLockoutMs: 800,                 // a touch longer to avoid retrigger
  // gesture confidence — LOWER = more sensitive
  fistConfidence: 0.40,                // was 0.55 — accept partial fists
  // music — set to the BPM of your track so spawn cadence locks to the beat
  musicBpm: 130,
  musicUrl: 'audio/track.mp3',         // expected file location relative to index.html
  musicVolume: 0.55,
};

// =============================================================
// CLEARANCE MATH — used to validate obstacle patterns at runtime
// =============================================================
// Total airtime is rise + fall. Shorter than the old 0.46s symmetric arc.
const JUMP_ARC_S = JUMP_RISE_S + JUMP_FALL_S;                 // 0.40s total
const JUMP_DISTANCE_PX = CFG.scrollSpeed * JUMP_ARC_S;        // ~160 px ≈ 3.8 blocks
const JUMP_DISTANCE_BLOCKS = JUMP_DISTANCE_PX / BLOCK_PX;
// The widest single-jump cluster we should ever spawn — leave 25% margin.
const MAX_CLUSTER_BLOCKS = JUMP_DISTANCE_BLOCKS * 0.75;       // ~2.85 blocks
// Min rest distance between patterns — enough to land and re-jump comfortably.
const MIN_REST_BLOCKS = JUMP_DISTANCE_BLOCKS * 1.20;          // ~4.6 blocks

// =============================================================
// AUDIO — music + procedural SFX
// =============================================================
// Browsers require a user gesture before any audio plays. We lazy-create the
// AudioContext on the first tap/click. SFX (jump, crash) are synthesized via
// Web Audio so we don't need extra files. Music is an HTMLAudioElement
// pointing at audio/track.mp3 — bring your own file (see README).
let audioCtx = null;
let musicEl = null;
let musicReady = false;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) { /* iOS Safari may need a click — that's the gesture */ }

  // Music as an Audio element, looped
  musicEl = new Audio(CFG.musicUrl);
  musicEl.loop = true;
  musicEl.volume = CFG.musicVolume;
  musicEl.preload = 'auto';
  musicEl.addEventListener('canplaythrough', () => { musicReady = true; });
  musicEl.addEventListener('error', () => {
    console.warn('Music file not found at', CFG.musicUrl, '— gameplay continues silently');
  });
}

function startMusic() {
  if (!musicEl) return;
  // Restart from top when starting/restarting a run
  try {
    musicEl.currentTime = 0;
    const playP = musicEl.play();
    if (playP && playP.catch) playP.catch(() => { /* autoplay policy */ });
  } catch (e) { /* ignore */ }
}

function stopMusic() {
  if (!musicEl) return;
  try { musicEl.pause(); } catch (e) {}
}

// Procedural SFX. Each is a short envelope on a synth voice.
function playJumpSfx() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  // Short upward chirp
  osc.frequency.setValueAtTime(420, t);
  osc.frequency.exponentialRampToValueAtTime(900, t + 0.07);
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(0.18, t + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.08);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.1);
}

function playCrashSfx() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // Noise burst via a buffer of random samples
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.35, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  // Lowpass for "thud" rather than "static"
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.setValueAtTime(800, t);
  filt.frequency.exponentialRampToValueAtTime(120, t + 0.3);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.6, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
  src.connect(filt).connect(gain).connect(audioCtx.destination);
  src.start(t);
}

// =============================================================
// CANVAS
// =============================================================
const stage = document.getElementById('stage');
const ctx = stage.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  stage.width = W * DPR;
  stage.height = H * DPR;
  stage.style.width = W + 'px';
  stage.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();

// =============================================================
// STATE
// =============================================================
let nextObstacleId = 1;
const state = {
  running: false,
  dead: false,
  deadAt: 0,
  playerY: 0,
  velY: 0,
  onGround: true,
  cameraX: 0,
  obstacles: [],
  elapsed: 0,
  coyoteRemaining: 0,
  jumpBufferRemaining: 0,
  nextSpawnX: 0,
  patternsPlaced: 0,
  score: 0,
  best: Number(localStorage.getItem('dwm_best') || 0),
  particles: [],
};

function groundY() { return H - CFG.groundOffset; }

function reset() {
  state.running = true;
  state.dead = false;
  state.deadAt = 0;
  state.playerY = 0;
  state.velY = 0;
  state.onGround = true;
  state.cameraX = 0;
  state.obstacles = [];
  state.elapsed = 0;
  state.coyoteRemaining = 0;
  state.jumpBufferRemaining = 0;
  state.nextSpawnX = W + 200;
  state.patternsPlaced = 0;
  state.score = 0;
  state.particles = [];
  document.getElementById('overlayStart').classList.add('hidden');
  document.getElementById('overlayDead').classList.add('hidden');
  document.getElementById('restartBtn').style.visibility = 'hidden';
  startMusic();
}

// requestJump — does NOT directly mutate physics. It sets the jump buffer and
// the physics step decides whether to actually jump. This gives us coyote
// time + input buffering naturally.
function requestJump() {
  if (state.dead) {
    if (performance.now() - state.deadAt < CFG.deathLockoutMs) return;
    reset();
    return;
  }
  if (!state.running) {
    reset();
    return;
  }
  state.jumpBufferRemaining = CFG.jumpBufferS;
}

function die() {
  if (state.dead) return;
  state.running = false;
  state.dead = true;
  state.deadAt = performance.now();
  state.best = Math.max(state.best, state.score);
  localStorage.setItem('dwm_best', state.best);
  document.getElementById('deadScore').textContent = `Score ${state.score} · Best ${state.best}`;
  document.getElementById('overlayDead').classList.remove('hidden');
  document.getElementById('restartBtn').style.visibility = 'visible';
  playCrashSfx();
  stopMusic();
  for (let i = 0; i < 28; i++) {
    state.particles.push({
      x: CFG.playerX + CFG.playerSize / 2,
      y: groundY() + state.playerY + CFG.playerSize / 2,
      vx: (Math.random() - 0.5) * 700,
      vy: (Math.random() - 1) * 600,
      life: 0.85,
    });
  }
}

// =============================================================
// OBSTACLE PATTERNS
// =============================================================
// Each pattern is a list of obstacles at offsets in BLOCK units. After placing,
// we advance state.nextSpawnX past the pattern's right edge plus a "rest gap"
// long enough to land and jump again.
const SPIKE = (offsetBlocks)             => ({ type: 'spike', offset: offsetBlocks, w: 1.0, h: 1.0 });
const TALL  = (offsetBlocks, h = 1.6)    => ({ type: 'tall',  offset: offsetBlocks, w: 0.85, h });

// Every pattern is a SINGLE-JUMP cluster (cleared in one arc). `restBeats` is
// the gap to the NEXT pattern, expressed in musical beats — so spawns land on
// the beat of the music. We pick whole-beat or half-beat values to feel rhythmic.
//
// One beat at 130 BPM = 0.462s. At 9.5 blocks/s scroll, 1 beat = 4.39 blocks
// of travel. So a `restBeats: 1` is ~4.4 blocks (just above MIN_REST 4.6 — we
// validate at load).
const PATTERNS = [
  // EASY — single jumps with breathing room
  { name: 'single',          minDifficulty: 0.00, parts: [SPIKE(0)],                          restBeats: 2.0 },
  { name: 'single-wide',     minDifficulty: 0.00, parts: [SPIKE(0)],                          restBeats: 1.5 },
  { name: 'tall-solo',       minDifficulty: 0.10, parts: [TALL(0, 1.8)],                      restBeats: 2.0 },
  // MEDIUM — tight clusters, still one jump
  { name: 'double-touching', minDifficulty: 0.20, parts: [SPIKE(0), SPIKE(0.85)],             restBeats: 1.5 },
  { name: 'spike-tall',      minDifficulty: 0.35, parts: [SPIKE(0), TALL(1.0, 1.6)],          restBeats: 1.5 },
  { name: 'tall-spike',      minDifficulty: 0.45, parts: [TALL(0, 1.6), SPIKE(1.0)],          restBeats: 1.5 },
];

// Convert beats to pixels: pixels per beat = scrollSpeed * (60 / BPM)
function beatsToPx(beats) {
  return beats * CFG.scrollSpeed * (60 / CFG.musicBpm);
}

// Sanity check at load: warn if any pattern exceeds single-jump clearance.
(function validatePatterns() {
  const minRestPx = MIN_REST_BLOCKS * BLOCK_PX;
  for (const p of PATTERNS) {
    let maxRight = 0;
    for (const part of p.parts) {
      maxRight = Math.max(maxRight, part.offset + part.w);
    }
    if (maxRight > MAX_CLUSTER_BLOCKS) {
      console.warn(`Pattern "${p.name}" width ${maxRight.toFixed(2)} > MAX_CLUSTER ${MAX_CLUSTER_BLOCKS.toFixed(2)} — UNCLEARABLE`);
    }
    const restPx = beatsToPx(p.restBeats);
    if (restPx < minRestPx) {
      console.warn(`Pattern "${p.name}" rest ${p.restBeats} beats = ${restPx.toFixed(0)}px < MIN_REST ${minRestPx.toFixed(0)}px — too tight`);
    }
  }
})();

function pickPattern(difficulty) {
  const eligible = PATTERNS.filter(p => p.minDifficulty <= difficulty);
  // Bias toward harder patterns as difficulty rises, but never starve easy ones.
  const weights = eligible.map(p => {
    const tier = p.minDifficulty;
    // Easy (tier=0) gets weight 1.5 → 0.7 as difficulty 0 → 1
    // Hard (tier>=0.5) gets weight 0.3 → 1.5 as difficulty 0 → 1
    return Math.max(0.2, 1 + (difficulty - 0.5) * (tier > 0.3 ? 2 : -1.5));
  });
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < eligible.length; i++) {
    r -= weights[i];
    if (r <= 0) return eligible[i];
  }
  return eligible[0];
}

function placePattern(originX, pattern) {
  let maxRight = 0;
  for (const part of pattern.parts) {
    const wPx = part.w * BLOCK_PX;
    const hPx = part.h * BLOCK_PX;
    const x = originX + part.offset * BLOCK_PX;
    state.obstacles.push({
      id: nextObstacleId++,
      type: part.type,
      worldX: x,
      w: wPx,
      h: hPx,
    });
    maxRight = Math.max(maxRight, x + wPx);
  }
  return maxRight;
}

function spawnObstacles() {
  const difficulty = Math.min(1, state.elapsed / 80);
  const spawnWindow = state.cameraX + W + 200;
  const minRestPx = MIN_REST_BLOCKS * BLOCK_PX;
  while (state.nextSpawnX < spawnWindow) {
    const useEasy = state.patternsPlaced < 3;
    const p = useEasy ? PATTERNS[1] : pickPattern(difficulty);
    const rightEdge = placePattern(state.nextSpawnX, p);
    // Beat-locked spacing: gap to next pattern equals N beats of camera scroll.
    // Never shrink below physical clearance minimum.
    const restPx = Math.max(minRestPx, beatsToPx(p.restBeats));
    state.nextSpawnX = rightEdge + restPx;
    state.patternsPlaced += 1;
  }
}

// =============================================================
// PHYSICS STEP
// =============================================================
function step(dt) {
  if (!state.running) {
    // Particles still animate after death so the burst plays out
    updateParticles(dt);
    return;
  }
  state.elapsed += dt;

  // Drain forgiveness timers
  state.coyoteRemaining = Math.max(0, state.coyoteRemaining - dt);
  state.jumpBufferRemaining = Math.max(0, state.jumpBufferRemaining - dt);

  // If a jump press is buffered AND we're either grounded or within coyote
  // window, fire the jump.
  const canJump = state.onGround || state.coyoteRemaining > 0;
  if (state.jumpBufferRemaining > 0 && canJump) {
    state.velY = CFG.jumpVelocity;
    state.onGround = false;
    state.coyoteRemaining = 0;
    state.jumpBufferRemaining = 0;
    playJumpSfx();
  }

  const wasOnGround = state.onGround;

  // Asymmetric gravity: lighter while ascending (vy<0), heavier while falling.
  // This is the secret sauce — the cube pops UP fast and falls DOWN faster,
  // ready for the next obstacle.
  const grav = state.velY < 0 ? CFG.gravityUp : CFG.gravityDown;
  state.velY += grav * dt;
  state.playerY += state.velY * dt;
  if (state.playerY >= 0) {
    state.playerY = 0;
    state.velY = 0;
    state.onGround = true;
  } else {
    state.onGround = false;
  }
  // Just walked off a ledge (or just left top of jump): start coyote window
  if (wasOnGround && !state.onGround && state.velY > 0) {
    state.coyoteRemaining = CFG.coyoteTimeS;
  }

  // Scroll world
  state.cameraX += CFG.scrollSpeed * dt;
  spawnObstacles();

  // Cull obstacles behind camera
  state.obstacles = state.obstacles.filter(o => o.worldX + o.w > state.cameraX - 80);

  // Collision — slightly forgiving hitbox (12% inset)
  const inset = CFG.playerSize * 0.12;
  const pLeft = state.cameraX + CFG.playerX + inset;
  const pRight = state.cameraX + CFG.playerX + CFG.playerSize - inset;
  const pTop = groundY() + state.playerY + inset;
  const pBottom = groundY() + state.playerY + CFG.playerSize - inset;

  for (const o of state.obstacles) {
    const oLeft = o.worldX;
    const oRight = o.worldX + o.w;
    const oTop = groundY() + CFG.playerSize - o.h;
    const oBottom = groundY() + CFG.playerSize;
    if (pRight > oLeft && pLeft < oRight && pBottom > oTop && pTop < oBottom) {
      die();
      return;
    }
  }

  state.score = Math.floor(state.cameraX / 10);
  updateParticles(dt);
}

function updateParticles(dt) {
  for (const p of state.particles) {
    p.vy += 1400 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  }
  state.particles = state.particles.filter(p => p.life > 0);
}

// =============================================================
// RENDER
// =============================================================
function render() {
  ctx.fillStyle = '#0b0d12';
  ctx.fillRect(0, 0, W, H);

  // Parallax skyline
  const tileW = 56;
  const offset = (state.cameraX * 0.3) % tileW;
  for (let i = -1; i < Math.ceil(W / tileW) + 1; i++) {
    const x = i * tileW - offset;
    const seed = Math.floor((state.cameraX * 0.3) / tileW) + i;
    const h = 36 + (Math.abs(Math.sin(seed * 12.9898) * 43758.5453) % 70);
    ctx.fillStyle = '#1b2030';
    ctx.fillRect(x, groundY() + CFG.playerSize - h, tileW - 4, h);
  }

  // Ground line
  ctx.fillStyle = '#7ee787';
  ctx.fillRect(0, groundY() + CFG.playerSize, W, 2);

  // Obstacles
  for (const o of state.obstacles) {
    const sx = o.worldX - state.cameraX;
    if (sx < -80 || sx > W + 20) continue;
    if (o.type === 'tall') {
      const top = groundY() + CFG.playerSize - o.h;
      ctx.fillStyle = '#c77dff';
      ctx.fillRect(sx, top, o.w, o.h);
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(sx, top, o.w, 3);
    } else {
      ctx.fillStyle = '#ff5d73';
      drawSpike(sx, groundY() + CFG.playerSize, o.w, o.h);
    }
  }

  // Player (rotating cube)
  const px = CFG.playerX + CFG.playerSize / 2;
  const py = groundY() + state.playerY + CFG.playerSize / 2;
  const rot = (state.cameraX * 0.012) % (Math.PI * 2);
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(rot);
  ctx.shadowColor = '#ffd166';
  ctx.shadowBlur = 14;
  ctx.fillStyle = '#ffd166';
  ctx.fillRect(-CFG.playerSize / 2, -CFG.playerSize / 2, CFG.playerSize, CFG.playerSize);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(-CFG.playerSize / 2 + 6, -CFG.playerSize / 2 + 6, CFG.playerSize - 12, CFG.playerSize - 12);
  ctx.restore();

  // Particles
  for (const p of state.particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = '#ffd166';
    ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
  }
  ctx.globalAlpha = 1;

  // HUD
  document.getElementById('score').textContent = state.score;
  document.getElementById('best').textContent = `BEST ${Math.max(state.best, state.score)}`;
}

function drawSpike(x, baseY, w, h) {
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.lineTo(x + w / 2, baseY - h);
  ctx.lineTo(x + w, baseY);
  ctx.closePath();
  ctx.fill();
}

let last = performance.now();
function loop(now) {
  const dt = Math.min(0.033, (now - last) / 1000);
  last = now;
  step(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

document.addEventListener('pointerdown', (e) => {
  initAudio();    // first user gesture — unlocks audio on iOS
  if (e.target.closest('.pill')) return;
  requestJump();
});
document.getElementById('restartBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (state.dead) {
    if (performance.now() - state.deadAt < CFG.deathLockoutMs) return;
    reset();
  }
});

// =============================================================
// INPUT — GESTURE (MediaPipe)
// =============================================================
const camWrap = document.getElementById('camWrap');
const camVideo = document.getElementById('camVideo');
const camOverlay = document.getElementById('camOverlay');
const camOverlayCtx = camOverlay.getContext('2d');
const gestureLabel = document.getElementById('gestureLabel');
const toggleBtn = document.getElementById('gestureToggle');

let gestureRecognizer = null;
let gestureModeOn = false;
let videoStream = null;
let lastFistAt = 0;
let recognitionLoopId = null;

async function initGestureRecognizer() {
  toggleBtn.textContent = 'LOADING...';
  toggleBtn.classList.add('warn');
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
  );
  gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        'https://storage.googleapis.com/mediapipe-tasks/gesture_recognizer/gesture_recognizer.task',
      delegate: 'GPU',
    },
    runningMode: 'VIDEO',
    numHands: 1,
  });
  toggleBtn.classList.remove('warn');
}

async function startGestureMode() {
  try {
    if (!gestureRecognizer) await initGestureRecognizer();
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 320, height: 240 },
      audio: false,
    });
    camVideo.srcObject = videoStream;
    await camVideo.play();
    camWrap.classList.add('active');
    camOverlay.width = camVideo.videoWidth || 320;
    camOverlay.height = camVideo.videoHeight || 240;
    gestureModeOn = true;
    toggleBtn.textContent = 'GESTURE ON';
    toggleBtn.classList.add('on');
    runRecognitionLoop();
  } catch (err) {
    console.error(err);
    toggleBtn.textContent = 'GESTURE OFF';
    toggleBtn.classList.remove('on');
    alert('Camera permission denied or model failed to load: ' + err.message);
  }
}

function stopGestureMode() {
  gestureModeOn = false;
  if (recognitionLoopId) cancelAnimationFrame(recognitionLoopId);
  if (videoStream) {
    videoStream.getTracks().forEach((t) => t.stop());
    videoStream = null;
  }
  camWrap.classList.remove('active');
  toggleBtn.textContent = 'GESTURE OFF';
  toggleBtn.classList.remove('on');
  gestureLabel.textContent = '—';
}

toggleBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  initAudio();
  if (gestureModeOn) stopGestureMode();
  else startGestureMode();
});

function runRecognitionLoop() {
  let lastVideoTime = -1;
  const tick = () => {
    if (!gestureModeOn) return;
    if (camVideo.readyState >= 2 && camVideo.currentTime !== lastVideoTime) {
      lastVideoTime = camVideo.currentTime;
      try {
        const result = gestureRecognizer.recognizeForVideo(camVideo, performance.now());
        handleResult(result);
        drawHandLandmarks(result);
      } catch (e) { /* warming up */ }
    }
    recognitionLoopId = requestAnimationFrame(tick);
  };
  recognitionLoopId = requestAnimationFrame(tick);
}

const JUMP_GESTURES = new Set([
  'Closed_Fist', 'Pointing_Up', 'Victory', 'Thumb_Up', 'ILoveYou',
]);

function handleResult(result) {
  if (!result?.gestures || !result.gestures.length) {
    gestureLabel.textContent = '—';
    return;
  }
  const top = result.gestures[0][0];
  gestureLabel.textContent = `${top.categoryName} ${(top.score * 100).toFixed(0)}%`;
  const isJumpGesture = JUMP_GESTURES.has(top.categoryName) &&
                        top.score > CFG.fistConfidence;
  const now = performance.now();
  if (isJumpGesture && now - lastFistAt > CFG.jumpDebounceMs) {
    requestJump();
    lastFistAt = now;
  }
}

function drawHandLandmarks(result) {
  const c = camOverlayCtx;
  c.clearRect(0, 0, camOverlay.width, camOverlay.height);
  if (!result?.landmarks?.length) return;
  c.fillStyle = '#7ee787';
  for (const hand of result.landmarks) {
    for (const lm of hand) {
      const x = lm.x * camOverlay.width;
      const y = lm.y * camOverlay.height;
      c.beginPath();
      c.arc(x, y, 3, 0, Math.PI * 2);
      c.fill();
    }
  }
}
</script>
</body>
